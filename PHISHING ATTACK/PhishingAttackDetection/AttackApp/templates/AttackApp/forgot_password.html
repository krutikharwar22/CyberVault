{% extends 'AttackApp/base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div style="max-width:400px;margin:6rem auto;padding:2rem">
  <h2>Forgot Password</h2>
  {% for msg in messages %}
  <div class="alert">{{ msg }}</div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" required autofocus
           style="width:100%;padding:.6rem;margin:.5rem 0 1rem">
    <button type="submit" class="btn">Send OTP</button>
  </form>
  <p style="margin-top:1rem"><a href="{% url 'AttackApp:login' %}">← Back to Login</a></p>
</div>
{% endblock %}
